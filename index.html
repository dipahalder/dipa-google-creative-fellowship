<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dipa Halder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --warm: #e05070;
      --warm-light: #f0a0b0;
      --cold-dark: #0f1923;
      --cold-light: #8fa3b1;
      --cream: #F5EFE6;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      height: 100vh;
      cursor: none;
    }

    /* Cursor */
    .cursor {
      width: 10px; height: 10px;
      background: var(--warm);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease;
      mix-blend-mode: multiply;
    }
    .cursor.large { width: 32px; height: 32px; }

    /* =====================
       SPLIT HERO
    ===================== */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .side {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 3.5rem 4rem;
      overflow: hidden;
      transition: flex 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .side.left {
      background: var(--cold-dark);
      color: var(--cold-light);
      flex: 1;
    }

    .side.right {
      background:
        radial-gradient(ellipse at 85% 5%, #8c6d85 0%, transparent 40%),
        radial-gradient(ellipse at 15% 15%, #7d7391 0%, transparent 40%),
        radial-gradient(ellipse at 60% 30%, #a3818e 0%, transparent 45%),
        radial-gradient(ellipse at 90% 50%, #944255 0%, transparent 35%),
        radial-gradient(ellipse at 10% 60%, #6d7d95 0%, transparent 40%),
        radial-gradient(ellipse at 50% 70%, #a88d97 0%, transparent 45%),
        radial-gradient(ellipse at 30% 90%, #8a6d7d 0%, transparent 40%),
        radial-gradient(ellipse at 75% 85%, #a27a85 0%, transparent 35%),
        #957088;
      color: var(--ink);
      flex: 1;
    }

    /* Hover expand */
    .hero:hover .side.left { flex: 0.55; }
    .hero:hover .side.right { flex: 1.45; }
    .side.left:hover ~ .side.right { flex: 0.55 !important; }
    .side.left:hover { flex: 1.45 !important; }

    /* Grid texture */
    .side.left::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(143,163,177,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(143,163,177,0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* Scan line */
    .side.left::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(143,163,177,0.1), transparent);
      animation: scan 10s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 0; } 100% { top: 100%; }
    }

    /* Watercolor blobs */
    .watercolor {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden;
    }
    .watercolor svg { width: 100%; height: 100%; }

    /* Side label */
    .side-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.4;
      position: relative; z-index: 1;
    }

    /* Tags */
    .side-tags {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-top: 2rem;
      position: relative; z-index: 1;
    }

    .side-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      opacity: 0.3;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .side-tag::before {
      display: none;
    }

    /* Blink */
    .blink {
      font-family: 'DM Mono', monospace;
      font-size: 1.2rem;
      color: rgba(143,163,177,0.35);
      animation: blink 1.2s step-end infinite;
      position: relative;
      z-index: 1;
      margin-bottom: 2rem;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* Center divider */
    .center-bar {
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.12) 30%, rgba(255,255,255,0.12) 70%, transparent 100%);
      z-index: 10;
      pointer-events: none;
    }

    /* Bottom overlay — name + podcast */
    .bottom-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      padding: 2rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .footer-line {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 0.5rem;
    }

    /* Center block — name + podcast */
    .center-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-align: center;
      pointer-events: none;
    }

    .center-overlay .podcast-bar {
      pointer-events: all;
    }

    .name-block h1 {
      font-size: clamp(2.8rem, 5vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: white;
      line-height: 1;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .name-block .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-top: 0.6rem;
      text-shadow: 0 1px 10px rgba(0,0,0,0.3);
    }

    /* Podcast pill */
    .podcast-bar {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      background: rgba(20, 10, 25, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      padding: 0.8rem 1.4rem;
      width: fit-content;
      text-decoration: none;
      transition: background 0.3s ease, border-color 0.3s ease;
      cursor: pointer;
    }

    .podcast-bar:hover {
      background: rgba(20, 10, 25, 0.9);
      border-color: rgba(255,255,255,0.25);
    }

    .play-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--warm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .play-btn::after {
      content: '';
      width: 0; height: 0;
      border-style: solid;
      border-width: 5px 0 5px 9px;
      border-color: transparent transparent transparent #fff;
      margin-left: 2px;
    }

    .podcast-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .podcast-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255,255,255,0.8);
    }

    .podcast-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm);
      opacity: 0.8;
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 24px;
      margin-left: auto;
    }

    .wave-bar {
      width: 2px;
      background: var(--warm);
      border-radius: 1px;
      opacity: 0.4;
      animation: wave 1.8s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }

    .wave-bar:nth-child(1){animation-delay:0s;height:40%}
    .wave-bar:nth-child(2){animation-delay:.1s;height:70%}
    .wave-bar:nth-child(3){animation-delay:.2s;height:50%}
    .wave-bar:nth-child(4){animation-delay:.05s;height:90%}
    .wave-bar:nth-child(5){animation-delay:.15s;height:35%}
    .wave-bar:nth-child(6){animation-delay:.25s;height:65%}
    .wave-bar:nth-child(7){animation-delay:.3s;height:80%}
    .wave-bar:nth-child(8){animation-delay:.08s;height:45%}
    .wave-bar:nth-child(9){animation-delay:.18s;height:60%}
    .wave-bar:nth-child(10){animation-delay:.22s;height:75%}
    .wave-bar:nth-child(11){animation-delay:.12s;height:40%}
    .wave-bar:nth-child(12){animation-delay:.28s;height:85%}

    /* =====================
       FOOTER
    ===================== */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: none; /* hidden — bottom-overlay handles bottom */
    }

    /* Actually let's put a tiny footer inside bottom overlay */
    .footer-line {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm);
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
    }

    .footer-line .footer-right { color: rgba(15, 25, 35, 0.6); }

    /* Animated doodle flower */
    .squiggle {
      position: absolute;
      top: 3rem;
      right: 3.5rem;
      width: 36px;
      height: 36px;
      z-index: 1;
      pointer-events: none;
      animation: floatFlower 6s ease-in-out infinite;
    }

    .squiggle svg { width: 100%; height: 100%; }

    .p1,.p2,.p3,.p4,.p5 { stroke-dasharray: 40; stroke-dashoffset: 40; }
    .p6 { stroke-dasharray: 25; stroke-dashoffset: 25; }

    .p1 { animation: drawLoop 3s ease 0s infinite; }
    .p2 { animation: drawLoop 3s ease 0.25s infinite; }
    .p3 { animation: drawLoop 3s ease 0.5s infinite; }
    .p4 { animation: drawLoop 3s ease 0.75s infinite; }
    .p5 { animation: drawLoop 3s ease 1s infinite; }
    .p6 { animation: drawLoop 3s ease 1.25s infinite; }

    @keyframes drawLoop {
      0%   { stroke-dashoffset: 40; opacity: 0; }
      10%  { opacity: 1; }
      40%  { stroke-dashoffset: 0; opacity: 1; }
      70%  { stroke-dashoffset: 0; opacity: 1; }
      90%  { opacity: 0; }
      100% { stroke-dashoffset: 40; opacity: 0; }
    }

    @keyframes floatFlower {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33% { transform: translateY(-6px) rotate(3deg); }
      66% { transform: translateY(3px) rotate(-2deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .side { padding: 2.5rem; min-height: 50vh; }
      .blink { bottom: auto; top: 8rem; }
      .center-bar { display: none; }
      .bottom-overlay { padding: 2rem; }
      .name-block h1 { font-size: 2.2rem; }
      .podcast-bar { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <div class="hero">

    <div class="center-bar"></div>

    <!-- LEFT: Engineer -->
    <div class="side left">
      <div style="position:relative;z-index:1">
        <span class="blink">_</span>
      </div>
    </div>

    <!-- RIGHT: Artist -->
    <div class="side right">

      <div class="squiggle">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <!-- 5 petals evenly spaced, pointing outward from center -->
          <!-- Top petal (90deg) -->
          <path class="p1" d="M30,28 C28,22 26,15 30,10 C34,15 32,22 30,28" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.3" stroke-linecap="round"/>
          <!-- Top-right petal (18deg) -->
          <path class="p2" d="M31,29 C37,25 43,20 48,23 C46,29 39,30 31,29" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.3" stroke-linecap="round"/>
          <!-- Bottom-right petal (306deg) -->
          <path class="p3" d="M31,31 C36,36 39,43 36,47 C31,45 29,38 31,31" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.3" stroke-linecap="round"/>
          <!-- Bottom-left petal (234deg) -->
          <path class="p4" d="M29,31 C24,36 18,40 14,37 C15,31 22,29 29,31" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.3" stroke-linecap="round"/>
          <!-- Top-left petal (162deg) -->
          <path class="p5" d="M29,29 C23,25 17,21 16,16 C21,14 27,19 29,29" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.3" stroke-linecap="round"/>
          <!-- Center -->
          <circle class="p6" cx="30" cy="30" r="3.5" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.3"/>
        </svg>
      </div>
    </div>

    <!-- CENTER OVERLAY — name + podcast -->
    <div class="center-overlay">
      <div class="name-block">
        <h1>Dipa Halder</h1>
        <p class="tagline">Engineer &nbsp;·&nbsp; Artist &nbsp;·&nbsp; World Builder</p>
      </div>
      <div class="podcast-bar" onclick="toggleAudio()" style="cursor:pointer">
        <audio id="audio" src="Leaving-a-perfect-corporate-life.mp3"></audio>
        <div class="play-btn" id="play-btn"></div>
        <div class="podcast-info">
          <span class="podcast-title">Dipa Halder: A Creative Portrait</span>
          <span class="podcast-sub">NotebookLM · Generated from personal essays</span>
        </div>
        <div class="waveform" id="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM FOOTER -->
    <div class="bottom-overlay">
      <div class="footer-line">
        <span>dipahalder.com</span>
        <span class="footer-right">Made with ImageFX + NotebookLM</span>
      </div>
    </div>

  </div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('.podcast-bar').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('large'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('large'));
    });

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const waveform = document.getElementById('waveform');

    function toggleAudio() {
      if (audio.paused) {
        audio.play();
        // Pause icon
        playBtn.style.background = 'var(--warm)';
        playBtn.innerHTML = '<div style="display:flex;gap:3px;align-items:center"><div style="width:3px;height:10px;background:white;border-radius:1px"></div><div style="width:3px;height:10px;background:white;border-radius:1px"></div></div>';
        waveform.style.opacity = '1';
      } else {
        audio.pause();
        playBtn.innerHTML = '';
        playBtn.style.background = 'var(--warm)';
        waveform.style.opacity = '0.4';
      }
    }
  </script>

</body>
</html>
